<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход - Логос</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="reference-home auth-page">
    <a class="skip-link" href="#main">К содержимому</a>
    <!-- Шапка остается доступной даже на странице входа, чтобы можно было вернуться к разделам сайта. -->
    <header class="ref-header">
        <div class="ref-container ref-header__inner">
            <a class="ref-logo" href="index.html"><img src="images/logo.png" alt="Центр Логос"></a>
            <button class="burger" type="button" aria-label="Открыть меню">☰</button>
            <nav class="site-nav ref-nav">
                <a href="about.html">О центре</a><a href="courses.html">Курсы</a><a
                    href="teachers.html">Преподаватели</a><a href="results.html">Результаты</a><a
                    href="contacts.html">Контакты</a>
            </nav>
            <div class="ref-header__tools">
                <a class="ref-account" href="login.html" aria-current="page"><span
                        class="ref-account__text">Кабинет</span><img src="images/user.png" alt=""
                        aria-hidden="true"></a>
                <div class="ref-switchers">
                    <div class="ref-segment" role="group" aria-label="Переключение языка"><button type="button"
                            data-lang-choice="ru">RU</button><span>/</span><button type="button"
                            data-lang-choice="en">EN</button></div>
                    <div class="ref-segment" role="group" aria-label="Переключение темы"><button type="button"
                            data-theme-choice="dark">Dark</button><span>/</span><button type="button"
                            data-theme-choice="light">Light</button></div>
                </div>
                <button class="ref-eye-button" type="button" data-modal-open="settings"
                    aria-label="Версия для слабовидящих"><img src="images/eyes.png" alt="" aria-hidden="true"></button>
            </div>
        </div>
    </header>

 <main id="main">
    <!-- Форма входа проверяется в js/app.js, после входа здесь же показывается личный кабинет. -->
    <section class="auth-main ref-container">
      <div class="auth-breadcrumb"><a href="index.html" data-auth="home">Главная</a><span>›</span><strong data-auth="loginCrumb">Вход</strong></div>
      <h1 data-auth="loginHeading">Вход в кабинет</h1>
      <p data-auth="loginLead">Авторизуйтесь, чтобы открыть функции ученика или администратора.</p>

      <div class="auth-layout auth-layout--single">
        <form class="auth-card auth-card--login" id="loginForm" autocomplete="off" novalidate>
          <h2 data-auth="loginCard">Авторизация</h2>
          <label class="auth-field"><span data-auth="email">Email</span>
            <input id="loginEmail" name="email" type="email" autocomplete="off" required>
            <span class="error" data-error="loginEmail"></span>
          </label>
          <div class="auth-field"><label for="loginPassword" data-auth="password">Пароль</label>
            <span class="auth-password">
              <input id="loginPassword" name="password" type="password" autocomplete="new-password" required>
              <button class="auth-password__toggle" type="button" data-password-toggle="loginPassword">Показать</button>
            </span>
            <span class="error" data-error="loginPassword"></span>
          </div>
          <button class="ref-button auth-submit" type="submit" data-auth="signIn">Войти</button>
          <p class="auth-link"><span data-auth="noAccount">Нет аккаунта?</span> <a href="register.html" data-auth="signUp">Зарегистрироваться</a></p>
        </form>
      </div>

      <!-- В этот блок скрипт подставляет кабинет ученика или панель администратора. -->
      <div class="auth-profile" id="profilePanel"></div>
    </section>
  </main>

    <div class="modal-backdrop" data-modal="settings">
        <div class="modal">
            <div class="modal-head">
                <h2 data-auth="settingsTitle">Версия для слабовидящих</h2><button class="icon-btn" data-modal-close
                    type="button">×</button>
            </div>
            <div class="settings-inner settings-inner--vision"><label>Размер шрифта <select data-setting="fontSize">
                        <option value="normal">100%</option>
                        <option value="large">150%</option>
                        <option value="xlarge">200%</option>
                    </select></label><label>Цветовая схема <select data-setting="visionScheme">
                        <option value="light">Белая с чёрным</option>
                        <option value="dark">Чёрная с белым</option>
                        <option value="green">Чёрная с зелёным</option>
                    </select></label><label class="vision-check"><input type="checkbox" data-setting="hideImages">
                    <span>Отключить изображения</span></label><button type="button" data-reset-settings>Сбросить
                    настройки</button></div>
        </div>
    </div>
    <div class="toast" aria-live="polite"></div>
    <script src="js/app.js"></script>
</body>

</html>
